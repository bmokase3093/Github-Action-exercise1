name: Lint Test and Deploy
on: push
jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
      - name: Install dependencies
        run: npm install
      - name: Lint the code
        run: npm run lint
      - name: Run tests
        run: npm test
      - name: Build the project
        run: npm run build